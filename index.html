<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="ACT IV 未来视觉研究室，以静态、动态、交互与未来视觉构建跨媒介视觉实验。"
    />
    <meta name="theme-color" content="#030303" />
    <link rel="icon" type="image/png" href="/logo2.png" />
    <title>ACT IV | Future Visual Lab</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #030303;
        --ink: #f8f8f8;
        --font-main: "Aptos", "Microsoft YaHei UI", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      }

      html,
      body,
      #root {
        min-width: 320px;
        min-height: 100%;
        background: var(--bg);
      }

      html {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow-x: hidden;
        background:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          radial-gradient(circle at 70% 0%, rgba(138, 85, 255, 0.2), transparent 34rem),
          #030303;
        background-size: 54px 54px, 54px 54px, auto, auto;
        color: var(--ink);
        font-family: var(--font-main);
      }

      #root:empty::before {
        position: fixed;
        inset: 0;
        content: "";
        background:
          linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px),
          radial-gradient(circle at 70% 0%, rgba(138, 85, 255, 0.2), transparent 34rem),
          #030303;
        background-size: 54px 54px, 54px 54px, auto, auto;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
